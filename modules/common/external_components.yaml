# External components used by Atmosfera Echo Hub.
# Patched ESPHome components live in the project ESPHome fork.
# artwork_image comes from the media player project.
external_components:
  - source:
      type: git
      url: https://github.com/kyvaith/esphome
      ref: dev
      path: esphome/components
    components: [const, mipi, mipi_dsi, lvgl, image, es7210, esp32_jpeg, artwork_image, sendspin, va_client, resampler]
    refresh: always
  - source:
      type: git
      url: https://github.com/kyvaith/esphome-intercom
      ref: audio-speaker-fast-path
      path: esphome/components
    components: [audio_processor, esp_audio_stack, esp_afe]
    refresh: always
