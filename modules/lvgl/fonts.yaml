# Material 3 typography for the round LVGL UI.
# Roboto keeps the interface aligned with Android/WearOS, while Material Symbols
# are reserved for icon-only controls so text labels stay crisp and readable.
font:
  - file:
      type: gfonts
      family: Roboto
      weight: 400
    id: roboto_14
    size: 14
    bpp: 2
    glyphsets:
      - GF_Latin_Core
    ignore_missing_glyphs: true

  - file:
      type: gfonts
      family: Roboto
      weight: 400
    id: roboto_16
    size: 16
    bpp: 2
    glyphsets:
      - GF_Latin_Core
    ignore_missing_glyphs: true

  - file:
      type: gfonts
      family: Roboto
      weight: 400
    id: roboto_18
    size: 18
    bpp: 2
    glyphsets:
      - GF_Latin_Core
    ignore_missing_glyphs: true

  - file:
      type: gfonts
      family: Roboto
      weight: 500
    id: roboto_20
    size: 20
    bpp: 2
    glyphsets:
      - GF_Latin_Core
    ignore_missing_glyphs: true

  - file:
      type: gfonts
      family: Roboto
      weight: 500
    id: roboto_24
    size: 24
    bpp: 2
    glyphsets:
      - GF_Latin_Core
    ignore_missing_glyphs: true

  - file:
      type: gfonts
      family: Roboto
      weight: 500
    id: roboto_30
    size: 30
    bpp: 2
    glyphsets:
      - GF_Latin_Core
    ignore_missing_glyphs: true

  - file:
      type: gfonts
