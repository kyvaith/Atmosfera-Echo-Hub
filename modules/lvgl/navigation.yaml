# Navigation state and screen-level actions.
# Tile pages, music view and settings view share this small state machine.
globals:
  - id: ui_page
    type: int
    restore_value: no
    initial_value: '1'
  # Application registry. Home/tile pages keep using ui_page=1..4; every
  # fullscreen program is tracked here so launch/close gestures stay generic.
  - id: ui_home_page
    type: int
    restore_value: no
    initial_value: '1'
  - id: ui_active_app
    type: int
    restore_value: no
    initial_value: '0'
  - id: ui_tile_snapshots_ready
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: ui_tile_snapshot_prepared_page
    type: int
    restore_value: no
    initial_value: '0'
  - id: ui_touch_click_block_until_ms
    type: uint32_t
    restore_value: no
    initial_value: '0'
  - id: app_close_tracking
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: app_close_dragging
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: app_close_requested
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: app_close_start_x
    type: int
    restore_value: no
    initial_value: '0'
  - id: app_close_start_y
    type: int
    restore_value: no
    initial_value: '0'
  - id: app_close_last_x
    type: int
    restore_value: no
    initial_value: '0'
  - id: app_close_last_y
    type: int
    restore_value: no
    initial_value: '0'
  - id: tile_swipe_tracking
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: tile_swipe_dragging
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: tile_swipe_page
    type: int
    restore_value: no
    initial_value: '0'
  - id: tile_swipe_next_page
    type: int
    restore_value: no
    initial_value: '0'
  - id: tile_swipe_next_x
    type: int
    restore_value: no
    initial_value: '0'
  - id: tile_swipe_commit_latched
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: tile_swipe_start_x
    type: int
    restore_value: no
    initial_value: '0'
  - id: tile_swipe_start_y
    type: int
    restore_value: no
    initial_value: '0'
  - id: tile_swipe_last_x
    type: int
    restore_value: no
    initial_value: '0'
  - id: tile_swipe_last_y
    type: int
    restore_value: no
    initial_value: '0'
  - id: tile_swipe_last_render_ms
    type: uint32_t
    restore_value: no
    initial_value: '0'
  - id: settings_scroll_tracking
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: settings_scroll_dragging
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: settings_scroll_start_x
    type: int
    restore_value: no
    initial_value: '0'
  - id: settings_scroll_start_y
    type: int
    restore_value: no
    initial_value: '0'
  - id: settings_scroll_last_x
    type: int
    restore_value: no
    initial_value: '0'
  - id: settings_scroll_last_y
    type: int
    restore_value: no
    initial_value: '0'
  - id: settings_scroll_start_scroll_y
    type: int
    restore_value: no
    initial_value: '0'
  - id: settings_scroll_last_render_ms
    type: uint32_t
    restore_value: no
    initial_value: '0'

interval:
  - interval: 25ms
    then:
      - if:
          condition:
            lambda: 'return id(app_close_requested);'
          then:
            - globals.set:
                id: app_close_requested
                value: 'false'
            - script.execute: ui_close_app

script:
  - id: ui_apply_tile_positions
    then:
      - lambda: |-
          int page = id(ui_page);
          if (page < 1 || page > 4) page = 1;
          lv_obj_t *roots[] = {
            id(controls_root_1),
            id(controls_root_2),
            id(controls_root_3),
            id(controls_root_4),
          };
          for (int i = 0; i < 4; i++) {
            if (roots[i] == nullptr) continue;
            lv_obj_clear_flag(roots[i], LV_OBJ_FLAG_HIDDEN);
            lv_obj_align(roots[i], LV_ALIGN_CENTER, (i + 1 - page) * 800, 0);
          }

  - id: ui_reset_tile_roots
    then:
      - script.execute: ui_apply_tile_positions

  - id: ui_set_tile_visibility_1
    then:
      - globals.set:
          id: ui_page
          value: '1'
      - script.execute: ui_apply_tile_positions

  - id: ui_set_tile_visibility_2
    then:
      - globals.set:
          id: ui_page
          value: '2'
      - script.execute: ui_apply_tile_positions

  - id: ui_set_tile_visibility_3
    then:
      - globals.set:
          id: ui_page
          value: '3'
      - script.execute: ui_apply_tile_positions

  - id: ui_set_tile_visibility_4
    then:
      - globals.set:
          id: ui_page
          value: '4'
      - script.execute: ui_apply_tile_positions

  - id: ui_build_tile_snapshots_now
    mode: single
    then:
      - globals.set:
          id: ui_tile_snapshots_ready
          value: 'false'
      - globals.set:
          id: ui_tile_snapshot_prepared_page
          value: '0'
      - script.execute: ui_set_tile_visibility_1
      - delay: 80ms
      - lambda: |-
          ESP_LOGW("boot.diag",
                   "tile snapshot window: begin page=%d internal=%uK/%uK psram=%uK/%uK",
                   id(ui_page),
                   (unsigned) (heap_caps_get_free_size(MALLOC_CAP_INTERNAL) / 1024),
                   (unsigned) (heap_caps_get_largest_free_block(MALLOC_CAP_INTERNAL) / 1024),
                   (unsigned) (heap_caps_get_free_size(MALLOC_CAP_SPIRAM) / 1024),
                   (unsigned) (heap_caps_get_largest_free_block(MALLOC_CAP_SPIRAM) / 1024));
          lv_obj_update_layout(lv_obj_get_parent(id(controls_root_1)));
          const bool prepared = lvgl_esphome_snapshot_cache_tile_window(
              id(controls_root_1), id(controls_root_2), id(controls_root_3), id(controls_root_4), id(ui_page), 800);
          id(ui_tile_snapshots_ready) = prepared;
          id(ui_tile_snapshot_prepared_page) = prepared ? id(ui_page) : 0;
          ESP_LOGW("boot.diag",
                   "tile snapshot window: done page=%d ready=%u internal=%uK/%uK psram=%uK/%uK",
                   id(ui_page), (unsigned) id(ui_tile_snapshots_ready),
                   (unsigned) (heap_caps_get_free_size(MALLOC_CAP_INTERNAL) / 1024),
                   (unsigned) (heap_caps_get_largest_free_block(MALLOC_CAP_INTERNAL) / 1024),
                   (unsigned) (heap_caps_get_free_size(MALLOC_CAP_SPIRAM) / 1024),
                   (unsigned) (heap_caps_get_largest_free_block(MALLOC_CAP_SPIRAM) / 1024));

  - id: ui_refresh_tile_snapshots
    mode: restart
    then:
      - delay: 550ms
      - lambda: |-
          if (id(ui_active_app) != 0 || id(ui_page) < 1 || id(ui_page) > 4) return;
          if (id(ui_tile_snapshots_ready) && id(ui_tile_snapshot_prepared_page) == id(ui_page)) return;
          if (lvgl_esphome_snapshot_is_active()) {
            id(ui_tile_snapshots_ready) = false;
            id(ui_tile_snapshot_prepared_page) = 0;
            id(ui_refresh_tile_snapshots).execute();
            return;
          }
          static uint32_t boot_snapshot_diag_budget = 4;
          const bool log_boot_snapshot = boot_snapshot_diag_budget > 0;
          if (log_boot_snapshot) {
            boot_snapshot_diag_budget--;
            ESP_LOGW("boot.diag",
                     "tile snapshot window refresh: begin page=%d internal=%uK/%uK psram=%uK/%uK",
                     id(ui_page),
                     (unsigned) (heap_caps_get_free_size(MALLOC_CAP_INTERNAL) / 1024),
                     (unsigned) (heap_caps_get_largest_free_block(MALLOC_CAP_INTERNAL) / 1024),
                     (unsigned) (heap_caps_get_free_size(MALLOC_CAP_SPIRAM) / 1024),
                     (unsigned) (heap_caps_get_largest_free_block(MALLOC_CAP_SPIRAM) / 1024));
          }
          const bool prepared = lvgl_esphome_snapshot_cache_tile_window(
              id(controls_root_1), id(controls_root_2), id(controls_root_3), id(controls_root_4), id(ui_page), 800);
          id(ui_tile_snapshots_ready) = prepared;
          id(ui_tile_snapshot_prepared_page) = prepared ? id(ui_page) : 0;
          if (log_boot_snapshot || !prepared) {
            ESP_LOGW("boot.diag",
                     "tile snapshot window refresh: done page=%d prepared=%u internal=%uK/%uK psram=%uK/%uK",
                     id(ui_page), (unsigned) prepared,
                     (unsigned) (heap_caps_get_free_size(MALLOC_CAP_INTERNAL) / 1024),
                     (unsigned) (heap_caps_get_largest_free_block(MALLOC_CAP_INTERNAL) / 1024),
                     (unsigned) (heap_caps_get_free_size(MALLOC_CAP_SPIRAM) / 1024),
                     (unsigned) (heap_caps_get_largest_free_block(MALLOC_CAP_SPIRAM) / 1024));
          }

  - id: ui_show_home_page
    mode: restart
    then:
      - lambda: |-
          int page = id(ui_home_page);
          if (page < 1 || page > 4) page = 1;
          id(ui_page) = page;
          lv_obj_t *roots[] = {
            id(controls_root_1),
            id(controls_root_2),
            id(controls_root_3),
            id(controls_root_4),
          };
          for (int i = 0; i < 4; i++) {
            if (roots[i] == nullptr) continue;
            lv_obj_clear_flag(roots[i], LV_OBJ_FLAG_HIDDEN);
            lv_obj_align(roots[i], LV_ALIGN_CENTER, (i + 1 - page) * 800, 0);
          }
          lv_obj_update_layout(lv_obj_get_parent(id(controls_root_1)));
      - lvgl.page.show:
          id: controls_page
          animation: NONE
          time: 50ms

  - id: ui_open_player_app
    mode: restart
    then:
      - if:
          condition:
            lambda: |-
              return id(ui_active_app) == 0 &&
                     (int32_t) (millis() - id(ui_touch_click_block_until_ms)) >= 0;
          then:
            - script.stop: ui_refresh_tile_snapshots
            - lambda: |-
                if (id(ui_page) >= 1 && id(ui_page) <= 4) id(ui_home_page) = id(ui_page);
                id(ui_active_app) = 1;
                id(ui_touch_click_block_until_ms) = millis() + 800;
                lv_obj_clear_flag(id(app_close_gesture_zone), LV_OBJ_FLAG_HIDDEN);
                lv_obj_move_foreground(id(app_close_gesture_zone));
            - script.execute: ui_prepare_player_page
            - lambda: |-
                lv_obj_t *home = id(controls_root_1);
                if (id(ui_home_page) == 2) home = id(controls_root_2);
                else if (id(ui_home_page) == 3) home = id(controls_root_3);
                else if (id(ui_home_page) == 4) home = id(controls_root_4);
                lvgl_esphome_snapshot_app_open(id(wear_root), home, 800, 500);
            - delay: 440ms
            - lvgl.page.show:
                id: music_page
                animation: NONE
                time: 50ms
            - delay: 100ms

  - id: ui_open_settings_app
    mode: restart
    then:
      - if:
          condition:
            lambda: |-
              return id(ui_active_app) == 0 &&
                     (int32_t) (millis() - id(ui_touch_click_block_until_ms)) >= 0;
          then:
            - script.stop: ui_refresh_tile_snapshots
            - lambda: |-
                if (id(ui_page) >= 1 && id(ui_page) <= 4) id(ui_home_page) = id(ui_page);
                id(ui_active_app) = 2;
                id(ui_touch_click_block_until_ms) = millis() + 800;
                lv_obj_clear_flag(id(app_close_gesture_zone), LV_OBJ_FLAG_HIDDEN);
                lv_obj_move_foreground(id(app_close_gesture_zone));
            - script.execute: ui_prepare_settings_page
            - lambda: |-
                lv_obj_t *home = id(controls_root_1);
                if (id(ui_home_page) == 2) home = id(controls_root_2);
                else if (id(ui_home_page) == 3) home = id(controls_root_3);
                else if (id(ui_home_page) == 4) home = id(controls_root_4);
                lvgl_esphome_snapshot_app_open(id(settings_root), home, 800, 500);
            - delay: 440ms
            - lvgl.page.show:
                id: settings_page
                animation: NONE
                time: 50ms
            - delay: 100ms

  - id: ui_open_voice_app
    mode: restart
    then:
      - if:
          condition:
            lambda: |-
              return id(ui_active_app) == 0 &&
                     (int32_t) (millis() - id(ui_touch_click_block_until_ms)) >= 0;
          then:
            - script.stop: ui_refresh_tile_snapshots
            - lambda: |-
                if (id(ui_page) >= 1 && id(ui_page) <= 4) id(ui_home_page) = id(ui_page);
                id(ui_active_app) = 3;
                id(ui_touch_click_block_until_ms) = millis() + 800;
                lv_obj_t *home = id(controls_root_1);
                if (id(ui_home_page) == 2) home = id(controls_root_2);
                else if (id(ui_home_page) == 3) home = id(controls_root_3);
                else if (id(ui_home_page) == 4) home = id(controls_root_4);
                lv_obj_clear_flag(id(voice_assistant_overlay), LV_OBJ_FLAG_HIDDEN);
                lv_obj_update_layout(id(voice_assistant_overlay));
                lvgl_esphome_snapshot_app_open(id(voice_assistant_overlay), home, 800, 500);
                lv_obj_add_flag(id(voice_assistant_overlay), LV_OBJ_FLAG_HIDDEN);
                lv_obj_clear_flag(id(app_close_gesture_zone), LV_OBJ_FLAG_HIDDEN);
                lv_obj_move_foreground(id(app_close_gesture_zone));
            - delay: 440ms
            - if:
                condition:
                  switch.is_off: voice_assistant_mute_switch
                then:
                  - if:
                      condition:
                        lambda: 'return id(va)->is_connected();'
                      then:
                        - lambda: |-
                            id(voice_assistant_phase) = ${voice_assist_waiting_phase_id};
                            id(voice_assistant_tts_active) = false;
                            id(voice_assistant_request_text).publish_state("");
                            id(voice_assistant_response_text).publish_state("");
                        - script.execute: display_wake
                        - script.execute: voice_assistant_update_overlay
                        - switch.turn_on: voice_audio_processing_switch
                        - lambda: 'id(va)->start_session();'
                      else:
                        - lambda: |-
                            id(voice_assistant_phase) = ${voice_assist_error_phase_id};
                            id(voice_assistant_request_text).publish_state("");
                            id(voice_assistant_response_text).publish_state("Realtime backend unavailable");
                        - script.execute: display_wake
                        - script.execute: voice_assistant_update_overlay
                else:
                  - lambda: |-
                      id(voice_assistant_phase) = ${voice_assist_error_phase_id};
                      id(voice_assistant_request_text).publish_state("");
                      id(voice_assistant_response_text).publish_state("Microphone muted");
                  - script.execute: display_wake
                  - script.execute: voice_assistant_update_overlay

  - id: ui_close_app
    mode: restart
    then:
      - if:
          condition:
            lambda: 'return id(ui_active_app) != 0;'
          then:
            - lambda: |-
                lv_obj_t *app = nullptr;
                if (id(ui_active_app) == 1) app = id(wear_root);
                else if (id(ui_active_app) == 2) app = id(settings_root);
                else if (id(ui_active_app) == 3) app = id(voice_assistant_overlay);
                lv_obj_t *home = id(controls_root_1);
                if (id(ui_home_page) == 2) home = id(controls_root_2);
                else if (id(ui_home_page) == 3) home = id(controls_root_3);
                else if (id(ui_home_page) == 4) home = id(controls_root_4);
                if (app != nullptr) {
                  lvgl_esphome_snapshot_app_close(app, home, 800, 400, 200, 500);
                }
            - if:
                condition:
                  lambda: 'return id(ui_active_app) == 1;'
                then:
                  - lvgl.widget.hide:
                      - volume_overlay
                      - queue_panel
                      - speaker_group_panel
            - script.execute: ui_show_home_page
            - if:
                condition:
                  lambda: 'return id(ui_active_app) == 3;'
                then:
                  - lambda: 'id(va)->send_interrupt();'
                  - speaker.stop: assistant_speaker
                  - switch.turn_off: timer_ringing
                  - lambda: 'id(voice_assistant_phase) = ${voice_assist_idle_phase_id};'
                  - script.execute: voice_assistant_update_overlay
                  - if:
                      condition:
                        and:
                          - switch.is_off: voice_assistant_mute_switch
                          - lambda: 'return id(va)->is_connected();'
                      then:
                        - switch.turn_on: voice_audio_processing_switch
                        - micro_wake_word.start:
            - delay: 440ms
            - globals.set:
                id: ui_active_app
                value: '0'
            - lvgl.widget.hide: app_close_gesture_zone
            - delay: 100ms

  - id: ui_show_tiles_1
    then:
      - lvgl.widget.hide: wear_root
      - lvgl.widget.update:
          id: wear_root
          y: 0
      - script.execute: media_hide_lottie_visual
      - globals.set:
          id: ui_page
          value: '1'
      - script.execute: ui_set_tile_visibility_1
      - script.execute: ui_refresh_tile_snapshots
  - id: ui_show_tiles_2
    then:
      - lvgl.widget.hide: wear_root
      - lvgl.widget.update:
          id: wear_root
          y: 0
      - script.execute: media_hide_lottie_visual
      - globals.set:
          id: ui_page
          value: '2'
      - script.execute: ui_set_tile_visibility_2
      - script.execute: ui_refresh_tile_snapshots
  - id: ui_show_tiles_3
    then:
      - lvgl.widget.hide: wear_root
      - lvgl.widget.update:
          id: wear_root
          y: 0
      - script.execute: media_hide_lottie_visual
      - globals.set:
          id: ui_page
          value: '3'
      - script.execute: ui_set_tile_visibility_3
      - script.execute: ui_refresh_tile_snapshots
  - id: ui_show_tiles_4
    then:
      - lvgl.widget.hide: wear_root
      - lvgl.widget.update:
          id: wear_root
          y: 0
      - script.execute: media_hide_lottie_visual
      - globals.set:
          id: ui_page
          value: '4'
      - script.execute: ui_set_tile_visibility_4
      - script.execute: ui_refresh_tile_snapshots
  - id: ui_prepare_player_page
    then:
      - lvgl.widget.show: wear_root
      - lvgl.widget.update:
          id: wear_root
          y: 0
      - lambda: |-
          atmosfera_ui::media_wavy_arc_init(id(media_main_progress_arc));
      - if:
          condition:
            lambda: 'return lv_obj_has_flag(id(album_art_background_widget), LV_OBJ_FLAG_HIDDEN);'
          then:
            - script.execute: media_show_lottie_visual
          else:
            - script.execute: media_hide_lottie_visual
      - script.execute: media_resume_deferred_artwork
      - script.execute: refresh_progress_bar_from_state

  - id: ui_prepare_settings_page
    then:
      - lvgl.widget.update:
          id: settings_root
          y: 0
      - script.execute: media_hide_lottie_visual
      - globals.set:
          id: ui_page
          value: '5'
      - script.execute: ui_apply_settings_state

  - id: ui_show_settings
    then:
      - script.execute: ui_prepare_settings_page
      - lvgl.page.show:
          id: settings_page
          animation: MOVE_BOTTOM
          time: 220ms
  - id: ui_apply_diagnostics_logging_state
    then:
      - lambda: |-
          const bool force_perf_logs = false;
          lvgl_esphome_set_perf_logging_enabled(force_perf_logs || id(settings_perf_logs_switch).state);
          lvgl_esphome_set_swipe_logging_enabled(id(settings_swipe_logs_switch).state);

  - id: ui_update_true_colour_state
    then:
      - lvgl.label.update:
          id: settings_true_colour_value
          text: "RGB888"
          text_color: 0xC3EDCF
      - lvgl.label.update:
          id: settings_true_colour_note
          text: "LVGL ARGB8888 / DSI 24-bit"

  - id: ui_update_screen_tone_state
    then:
      # Screen Tone currently needs an alpha overlay, which is too expensive on this display path.
      - lvgl.label.update:
          id: settings_screen_tone_value
          text: "OFF"
          text_color: 0xC4C7C5

  - id: ui_update_perf_overlay_state
    then:
      - if:
          condition:
            switch.is_on: settings_perf_overlay_switch
          then:
            - lvgl.label.update:
                id: settings_perf_overlay_value
                text: "ON"
                text_color: 0xC3EDCF
            - lvgl.widget.show: perf_overlay_label
            - lambda: |-
                if (id(perf_overlay_label) != nullptr) {
                  lv_obj_move_foreground(id(perf_overlay_label));
                }
          else:
            - lvgl.label.update:
                id: settings_perf_overlay_value
                text: "OFF"
                text_color: 0xC4C7C5
            - lvgl.widget.hide: perf_overlay_label

  - id: ui_update_system_logs_state
    then:
      - if:
          condition:
            switch.is_on: settings_system_logs_switch
          then:
            - lvgl.label.update:
                id: settings_system_logs_value
                text: "ON"
                text_color: 0xC3EDCF
          else:
            - lvgl.label.update:
                id: settings_system_logs_value
                text: "OFF"
                text_color: 0xC4C7C5

  - id: ui_update_perf_logs_state
    then:
      - script.execute: ui_apply_diagnostics_logging_state
      - if:
          condition:
            switch.is_on: settings_perf_logs_switch
          then:
            - lvgl.label.update:
                id: settings_perf_logs_value
                text: "ON"
                text_color: 0xC3EDCF
          else:
            - lvgl.label.update:
                id: settings_perf_logs_value
                text: "OFF"
                text_color: 0xC4C7C5

  - id: ui_update_swipe_logs_state
    then:
      - script.execute: ui_apply_diagnostics_logging_state
      - if:
          condition:
            switch.is_on: settings_swipe_logs_switch
          then:
            - lvgl.label.update:
                id: settings_swipe_logs_value
                text: "ON"
                text_color: 0xC3EDCF
          else:
            - lvgl.label.update:
                id: settings_swipe_logs_value
                text: "OFF"
                text_color: 0xC4C7C5

  - id: ui_update_beta_firmware_state
    then:
      - if:
          condition:
            switch.is_on: settings_beta_firmware_switch
          then:
            - lvgl.label.update:
                id: settings_beta_firmware_value
                text: "ON"
                text_color: 0xC3EDCF
          else:
            - lvgl.label.update:
                id: settings_beta_firmware_value
                text: "OFF"
                text_color: 0xC4C7C5

  - id: ui_update_voice_mute_state
    then:
      - if:
          condition:
            switch.is_on: voice_assistant_mute_switch
          then:
            - lvgl.label.update:
                id: settings_voice_mute_value
                text: "ON"
                text_color: 0xC3EDCF
          else:
            - lvgl.label.update:
                id: settings_voice_mute_value
                text: "OFF"
                text_color: 0xC4C7C5

  - id: ui_update_wake_sound_state
    then:
      - if:
          condition:
            switch.is_on: voice_assistant_wake_sound_switch
          then:
            - lvgl.label.update:
                id: settings_wake_sound_value
                text: "ON"
                text_color: 0xC3EDCF
          else:
            - lvgl.label.update:
                id: settings_wake_sound_value
                text: "OFF"
                text_color: 0xC4C7C5

  - id: ui_update_display_brightness_state
    then:
      - lvgl.label.update:
          id: settings_display_brightness_value
          text:
            format: "%.0f%%"
            args: [id(settings_display_brightness).state]

  - id: ui_update_display_timeout_state
    then:
      - if:
          condition:
            lambda: 'return id(settings_display_timeout).state <= 0.5f;'
          then:
            - lvgl.label.update:
                id: settings_display_timeout_value
                text: "Never"
          else:
            - lvgl.label.update:
                id: settings_display_timeout_value
                text:
                  format: "%.0fs"
                  args: [id(settings_display_timeout).state]

  - id: ui_update_wake_sensitivity_state
    then:
      - if:
          condition:
            select.is:
              id: mww_sensitivity_select
              options: ["Slightly sensitive"]
          then:
            - lvgl.label.update:
                id: settings_wake_sensitivity_value
                text: "Slightly"
      - if:
          condition:
            select.is:
              id: mww_sensitivity_select
              options: ["Moderately sensitive"]
          then:
            - lvgl.label.update:
                id: settings_wake_sensitivity_value
                text: "Moderate"
      - if:
          condition:
            select.is:
              id: mww_sensitivity_select
              options: ["Very sensitive"]
          then:
            - lvgl.label.update:
                id: settings_wake_sensitivity_value
                text: "Very"

  - id: ui_apply_settings_state
    then:
      - script.execute: ui_apply_diagnostics_logging_state
      - script.execute: ui_update_true_colour_state
      - script.execute: ui_update_screen_tone_state
      - script.execute: ui_update_perf_overlay_state
      - script.execute: ui_update_system_logs_state
      - script.execute: ui_update_perf_logs_state
      - script.execute: ui_update_swipe_logs_state
      - script.execute: ui_update_beta_firmware_state
      - script.execute: ui_update_display_brightness_state
      - script.execute: ui_update_display_timeout_state
      - script.execute: ui_update_voice_mute_state
      - script.execute: ui_update_wake_sound_state
      - script.execute: ui_update_wake_sensitivity_state
