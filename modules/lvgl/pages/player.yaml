                              border_color: 0xC3EDCF
                              pad_all: 0
                              scrollable: false
                              clickable: true
                              on_click:
                                then:
                                  - script.execute:
                                      id: speaker_toggle
                                      slot: 0
                              widgets:
                                - label:
                                    id: speaker_name_0
                                    text: "This Speaker"
                                    x: 28
                                    y: 15
                                    width: 300
                                    long_mode: DOT
                                    text_color: 0xF2F2F2
                                    text_font: roboto_20
                                - label:
                                    id: speaker_state_0
                                    text: "Grouped"
                                    x: 28
                                    y: 50
                                    text_color: 0xC3EDCF
                                    text_font: roboto_16
                                - label:
                                    id: speaker_volume_0
                                    text: "0%"
                                    x: 338
                                    y: 30
                                    width: 60
                                    text_align: CENTER
                                    text_color: 0xF2F2F2
                                    text_font: roboto_18
                                - button:
                                    x: 424
                                    y: 14
                                    width: 60
                                    height: 60
                                    radius: 30
                                    bg_color: 0x474747
                                    border_width: 0
                                    widgets:
                                      - label:
                                          text: "-"
                                          align: CENTER
                                          text_color: 0xF2F2F2
                                          text_font: roboto_24
                                    on_click:
                                      then:
                                        - script.execute:
                                            id: speaker_volume_change
                                            slot: 0
                                            direction: -1
                                - button:
                                    x: 512
                                    y: 14
                                    width: 60
                                    height: 60
                                    radius: 30
                                    bg_color: 0x474747
                                    border_width: 0
                                    widgets:
                                      - label:
                                          text: "+"
                                          align: CENTER
                                          text_color: 0xF2F2F2
                                          text_font: roboto_24
                                    on_click:
                                      then:
                                        - script.execute:
                                            id: speaker_volume_change
                                            slot: 0
                                            direction: 1
                          - obj:
                              id: speaker_row_1
                              width: 644
                              height: 88
                              radius: 44
                              bg_color: 0x332E3C
                              border_width: 1
                              border_color: 0x5C5F5E
                              pad_all: 0
                              scrollable: false
                              clickable: true
                              hidden: true
                              on_click:
                                then:
                                  - script.execute:
                                      id: speaker_toggle
                                      slot: 1
                              widgets:
                                - label:
                                    id: speaker_name_1
                                    text: ""
                                    x: 28
                                    y: 15
                                    width: 300
                                    long_mode: DOT
                                    text_color: 0xF2F2F2
                                    text_font: roboto_20
                                - label:
                                    id: speaker_state_1
                                    text: ""
                                    x: 28
                                    y: 50
                                    text_color: 0xC4C7C5
                                    text_font: roboto_16
                                - label:
                                    id: speaker_volume_1
                                    text: ""
                                    x: 338
                                    y: 30
                                    width: 60
                                    text_align: CENTER
                                    text_color: 0xF2F2F2
                                    text_font: roboto_18
                                - button:
