                    - obj:
                        id: group_volume_card
                        x: 104
                        y: 134
                        width: 592
                        height: 78
                        radius: 39
                        bg_color: 0x4D3D76
                        border_width: 1
                        border_color: 0x735E9A
                        pad_all: 0
                        scrollable: false
                        widgets:
                          - label:
                              text: "Group Volume"
                              x: 28
                              y: 22
                              text_color: 0xF2F2F2
                              text_font: roboto_20
                          - button:
                              x: 366
                              y: 10
                              width: 58
                              height: 58
                              radius: 29
                              bg_color: 0x474747
                              border_width: 0
                              widgets:
                                - label:
                                    text: "-"
                                    align: CENTER
                                    text_color: 0xF2F2F2
                                    text_font: roboto_24
                              on_click:
                                then:
                                  - script.execute:
                                      id: group_volume_step
                                      direction: -1
                          - button:
                              x: 454
                              y: 10
                              width: 58
                              height: 58
                              radius: 29
                              bg_color: 0x474747
                              border_width: 0
                              widgets:
                                - label:
                                    text: "+"
                                    align: CENTER
                                    text_color: 0xF2F2F2
                                    text_font: roboto_24
                              on_click:
                                then:
                                  - script.execute:
                                      id: group_volume_step
                                      direction: 1
                    - obj:
                        id: speaker_list_container
                        x: 78
                        y: 236
                        width: 644
                        height: 470
                        bg_color: 0x303030
                        bg_opa: 100%
                        border_width: 0
                        pad_all: 0
                        scrollable: true
                        scrollbar_mode: auto
                        layout:
                          type: flex
                          flex_flow: COLUMN
                          pad_row: 12
                        widgets:
                          - obj:
                              id: speaker_row_0
                              width: 644
                              height: 88
                              radius: 44
                              bg_color: 0x0F5223
