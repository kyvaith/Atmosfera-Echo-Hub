                                direction: -1
                    - button:
                        id: volume_overlay_up_button
                        align: CENTER
                        x: 86
                        y: 256
                        width: 104
                        height: 104
                        radius: 52
                        bg_color: 0x332E3C
                        border_width: 1
                        border_color: 0x5C5F5E
                        widgets:
                          - label:
                              text: "+"
                              align: CENTER
                              text_color: 0xF2F2F2
                              text_font: roboto_36
                        on_click:
                          then:
                            - script.execute:
                                id: main_volume_step
                                direction: 1
                    - button:
                        align: TOP_RIGHT
                        x: -72
                        y: 52
                        width: 70
                        height: 70
                        radius: 35
                        bg_color: 0x332E3C
                        border_width: 1
                        border_color: 0x5C5F5E
                        widgets:
                          - label:
                              text: "\uE5CD"
                              align: CENTER
                              text_color: 0xF2F2F2
                              text_font: material_symbols_24
                        on_click:
                          then:
                            - lvgl.widget.hide: volume_overlay

              - label:
                  id: footer_hint
                  text: ""
                  align: BOTTOM_MID
                  y: -20
