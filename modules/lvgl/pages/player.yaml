# Music player page.
# Artwork, transport controls, volume overlay and speaker grouping are rendered here for the round display.
lvgl:
  pages:
    - id: music_page
      bg_color: 0x000000
      widgets:
        - canvas:
            id: lottie_canvas_dependency
            width: 1
            height: 1
            x: -10
            y: -10
        - obj:
            id: wear_root
            width: 800
            height: 800
            align: CENTER
            bg_color: 0x000000
            border_width: 0
            radius: 0
            pad_all: 0
            scrollable: false
            widgets:
              - obj:
                  id: artwork_bg_panel
                  width: 800
                  height: 800
                  align: CENTER
                  bg_color: 0x2D2136
                  border_width: 0
                  radius: 0
                  pad_all: 0
                  scrollable: false
                  gesture_bubble: true

              - image:
                  id: figma_media_artwork_widget
                  x: 0
                  y: 0
                  width: 800
                  height: 800
                  src: figma_media_artwork_primary
                  opa: 100%

              - image:
                  id: album_art_background_widget
                  x: 0
                  y: 0
                  width: 800
                  height: 800
                  src: album_art_background
                  opa: 100%
                  hidden: true

              - obj:
                  id: artwork_primary_overlay
                  x: 0
                  y: 0
                  width: 800
                  height: 800
                  bg_color: 0x4D3D76
                  bg_opa: 30%
                  border_width: 0
                  radius: 0
                  pad_all: 0
                  scrollable: false
                  clickable: false

              - obj:
                  id: artwork_scrim
                  x: 0
                  y: 0
                  width: 800
                  height: 800
                  bg_color: 0x210F48
                  bg_opa: 60%
                  border_width: 0
                  radius: 0
                  pad_all: 0
                  scrollable: false
                  clickable: false

              - image:
                  id: figma_media_vignette_widget
                  x: 0
                  y: 0
                  width: 800
                  height: 800
                  src: figma_media_artwork_vignette
                  opa: 100%

              - label:
                  id: artwork_error_label
                  text: "Artwork unavailable"
                  align: CENTER
                  y: -24
                  width: 420
                  height: 42
                  text_font: roboto_18
                  text_color: 0xC4C7C5
                  text_align: CENTER
                  hidden: true

              - obj:
                  id: top_status_pill
                  width: 180
                  height: 48
                  align: TOP_MID
                  x: 0
                  y: 12
                  bg_color: 0x000000
                  bg_opa: 0%
                  border_width: 0
                  border_color: 0x5C5F5E
                  radius: 27
                  pad_all: 0
                  scrollable: false
                  gesture_bubble: true
                  widgets:
                    - label:
                        id: top_status_label
                        text: "9:30"
                        align: CENTER
                        text_color: 0xF5EEFB
                        text_font: wear_time_40

              - image:
                  id: figma_media_header_bolt_widget
                  x: 207
                  y: 92
                  width: 53
                  height: 53
                  src: figma_media_header_bolt
                  opa: 100%

              - button:
                  id: speaker_group_button
                  width: 160
                  height: 160
                  align: CENTER
                  x: 0
                  y: 293
                  bg_color: 0x000000
                  bg_opa: 0%
                  border_width: 0
                  border_color: 0x5C5F5E
                  radius: 80
                  pad_all: 0
                  scrollable: false
                  gesture_bubble: true
                  widgets:
                    - image:
                        src: figma_media_footer_speaker
                        align: CENTER
                        width: 147
                        height: 107
                  on_click:
                    then:
                      - script.execute: open_speaker_group_panel

              - obj:
                  id: lottie_visual_zone
                  width: 1
                  height: 1
                  x: -10
                  y: -10
                  bg_color: 0x000000
                  bg_opa: 0%
                  border_width: 0
                  radius: 0
                  pad_all: 0
                  scrollable: false
                  gesture_bubble: true
                  hidden: true
                  widgets:
                    - lottie:
                        id: weather_animation
                        file: "assets/animations/weather.json"
                        x: -10
                        y: -10
                        width: 1
                        height: 1
                        hidden: true

              - label:
                  id: title_label
                  text: "No Track"
                  x: 280
                  y: 82
                  width: 342
                  height: 66
                  long_mode: DOT
                  text_align: LEFT
                  text_color: 0xF5EEFB
                  text_font: wear_title_53
                  text_letter_space: 1

              - label:
                  id: artist_label
                  text: "-"
                  align: TOP_MID
                  y: 145
                  width: 460
                  height: 58
                  long_mode: DOT
                  text_align: CENTER
                  text_color: 0xF5EEFB
                  text_font: wear_body_47
                  text_letter_space: 1

              - label:
                  id: album_label
                  text: ""
                  align: TOP_MID
                  y: 186
                  width: 360
                  long_mode: DOT
                  text_align: CENTER
                  text_color: 0xC4C7C5
                  text_font: roboto_16
                  hidden: true

              - label:
                  id: media_time_label
                  text: "0:00 / 0:00"
                  align: TOP_MID
                  y: 506
                  width: 300
                  text_align: CENTER
                  text_color: 0xC4C7C5
                  text_opa: 100%
                  text_font: roboto_18
                  hidden: true

              - bar:
                  id: media_progress_bar
                  align: TOP_MID
                  y: 486
                  width: 320
                  height: 8
                  min_value: 0
                  max_value: 100
                  value: 0
                  bg_color: 0x5C5F5E
                  bg_opa: 100%
                  radius: 6
                  indicator:
                    bg_color: 0xD3E3FD
                    radius: 6
                  hidden: true

              - obj:
                  id: transport_group_surface
                  align: CENTER
                  y: 70
                  width: 520
                  height: 260
                  radius: 130
                  bg_color: 0x000000
                  bg_opa: 0%
                  border_width: 0
                  shadow_width: 0
                  outline_width: 0
                  pad_all: 0
                  scrollable: false
                  clickable: false

              - button:
                  id: queue_button
                  align: CENTER
                  x: -218
                  y: 213
                  width: 160
                  height: 160
                  radius: 80
                  bg_color: 0x000000
                  bg_opa: 0%
                  border_width: 0
                  border_color: 0x5C5F5E
                  pad_all: 0
                  scrollable: false
                  gesture_bubble: true
                  widgets:
                    - image:
                        src: figma_media_footer_queue
                        align: CENTER
                        width: 147
                        height: 107
                  on_click:
                    then:
                      - script.execute: open_queue_panel

              - button:
                  id: more_menu_button
                  align: CENTER
                  x: 218
                  y: 213
                  width: 160
                  height: 160
                  radius: 80
                  bg_color: 0x000000
                  bg_opa: 0%
                  border_width: 0
                  border_color: 0x5C5F5E
                  pad_all: 0
                  scrollable: false
                  gesture_bubble: true
                  widgets:
                    - image:
                        src: figma_media_footer_more
                        align: CENTER
                        width: 147
                        height: 107
                  on_click:
                    then:
                      - script.execute: show_volume_overlay

              - button:
                  id: prev_button
                  align: CENTER
                  x: -253
                  y: 0
                  width: 173
                  height: 173
                  radius: 87
                  bg_color: 0x000000
                  bg_opa: 0%
                  border_width: 0
                  border_color: 0x5C5F5E
                  pad_all: 0
                  scrollable: false
                  gesture_bubble: true
                  widgets:
                    - image:
                        src: figma_media_side_prev_button
                        align: CENTER
                        width: 173
                        height: 173
                  on_click:
                    then:
                      - homeassistant.service:
                          service: media_player.media_previous_track
                          variables:
                            target: !lambda 'return id(media_player_entity).state;'
                          data_template:
                            entity_id: "{{ target }}"

              - button:
                  id: next_button
                  align: CENTER
                  x: 253
                  y: 0
                  width: 173
                  height: 173
                  radius: 87
                  bg_color: 0x000000
                  bg_opa: 0%
                  border_width: 0
                  border_color: 0x5C5F5E
                  pad_all: 0
                  scrollable: false
                  gesture_bubble: true
                  widgets:
                    - image:
                        src: figma_media_side_next_button
                        align: CENTER
                        width: 173
                        height: 173
                  on_click:
                    then:
                      - homeassistant.service:
                          service: media_player.media_next_track
                          variables:
                            target: !lambda 'return id(media_player_entity).state;'
                          data_template:
                            entity_id: "{{ target }}"

              - obj:
                  id: play_scallop_top
                  align: CENTER
                  x: 0
                  y: -62
                  width: 72
                  height: 72
                  radius: 36
                  bg_color: 0xD3E3FD
                  bg_opa: 100%
                  border_width: 0
                  pad_all: 0
                  scrollable: false
                  clickable: false
                  hidden: true
              - obj:
                  id: play_scallop_bottom
                  align: CENTER
                  x: 0
                  y: 194
                  width: 72
                  height: 72
                  radius: 36
                  bg_color: 0xD3E3FD
                  bg_opa: 100%
                  border_width: 0
                  pad_all: 0
                  scrollable: false
                  clickable: false
                  hidden: true
              - obj:
                  id: play_scallop_left
                  align: CENTER
                  x: -128
                  y: 66
                  width: 72
                  height: 72
                  radius: 36
                  bg_color: 0xD3E3FD
                  bg_opa: 100%
                  border_width: 0
                  pad_all: 0
                  scrollable: false
                  clickable: false
                  hidden: true
              - obj:
                  id: play_scallop_right
                  align: CENTER
                  x: 128
                  y: 66
                  width: 72
                  height: 72
                  radius: 36
                  bg_color: 0xD3E3FD
                  bg_opa: 100%
                  border_width: 0
                  pad_all: 0
                  scrollable: false
                  clickable: false
                  hidden: true

              - canvas:
                  id: media_main_control_canvas
                  align: CENTER
                  x: 0
                  y: 0
                  width: 267
                  height: 267
                  transparent: true

              - button:
                  id: play_button
                  align: CENTER
                  x: 0
                  y: 0
                  width: 267
                  height: 267
                  radius: 134
                  bg_color: 0xD0BCFF
                  bg_opa: 0%
                  border_width: 0
                  pad_all: 0
                  scrollable: false
                  gesture_bubble: true
                  on_click:
                    then:
                      - homeassistant.service:
                          service: media_player.media_play_pause
                          variables:
                            target: !lambda 'return id(media_player_entity).state;'
                          data_template:
                            entity_id: "{{ target }}"

              - obj:
                  id: queue_panel
                  x: 0
                  y: 0
                  width: 800
                  height: 800
                  bg_color: 0x000000
                  bg_opa: 100%
                  border_width: 0
                  radius: 0
                  pad_all: 0
                  scrollable: false
                  hidden: true
                  widgets:
                    - label:
                        text: "Queue"
                        align: TOP_MID
                        y: 70
                        width: 420
                        text_align: CENTER
                        text_color: 0xF5EEFB
                        text_font: wear_title_53
                    - button:
                        id: queue_close_button
                        align: TOP_RIGHT
                        x: -72
                        y: 52
                        width: 70
                        height: 70
                        radius: 35
                        bg_color: 0x332E3C
                        border_width: 0
                        pad_all: 0
                        widgets:
                          - label:
                              text: "\uE5CD"
                              align: CENTER
                              text_color: 0xF2F2F2
                              text_font: material_symbols_24
                        on_click:
                          then:
                            - script.execute: close_queue_panel
                    - obj:
                        id: queue_current_row
                        align: TOP_MID
                        y: 188
                        width: 600
                        height: 118
                        radius: 59
                        bg_color: 0x332E3C
                        bg_opa: 100%
                        border_width: 0
                        pad_all: 0
                        scrollable: false
                        widgets:
                          - label:
                              id: queue_current_title_label
                              text: "No Track"
                              x: 36
                              y: 24
                              width: 440
                              long_mode: DOT
                              text_color: 0xF2F2F2
                              text_font: roboto_24
                          - label:
                              id: queue_current_artist_label
                              text: "-"
                              x: 36
                              y: 66
                              width: 440
                              long_mode: DOT
                              text_color: 0xC4C7C5
                              text_font: roboto_18
                    - label:
                        id: queue_empty_label
                        text: "Queue source not configured"
                        align: TOP_MID
                        y: 340
                        width: 520
                        text_align: CENTER
                        text_color: 0xC4C7C5
                        text_font: roboto_20

              - obj:
                  id: volume_overlay
                  x: 0
                  y: 0
                  width: 800
                  height: 800
                  bg_color: 0x000000
                  bg_opa: 100%
                  border_width: 0
                  radius: 0
                  pad_all: 0
                  scrollable: false
                  hidden: true
                  widgets:
                    - arc:
                        id: volume_arc
                        align: CENTER
                        y: 18
                        width: 570
                        height: 570
                        min_value: 0
                        max_value: 100
                        value: 50
                        adjustable: true
                        arc_color: 0x5C5F5E
                        arc_width: 30
                        arc_rounded: true
                        indicator:
                          arc_color: 0xD3E3FD
                          arc_width: 30
                          arc_rounded: true
                        knob:
                          bg_color: 0xF2F2F2
                          radius: 21
                          width: 42
                          height: 42
                          border_width: 0
                        on_value:
                          - lvgl.label.update:
                              id: volume_pct_label
                              text: !lambda |-
                                char buf[8];
                                snprintf(buf, sizeof(buf), "%d%%", (int)x);
                                return std::string(buf);
                          - if:
                              condition:
                                lambda: 'return !id(volume_updating_from_ha);'
                              then:
                                - lambda: |-
                                    id(volume_pending_pct) = (int)(x + 0.5f);
                                    id(volume_pending_until) = millis() + 1500;
                                - homeassistant.service:
                                    service: media_player.volume_set
                                    variables:
                                      target: !lambda 'return id(media_player_entity).state;'
                                      vol_level: !lambda 'return x / 100.0f;'
                                    data_template:
                                      entity_id: "{{ target }}"
                                      volume_level: "{{ vol_level }}"
                                - script.execute: show_volume_overlay
                    - label:
                        id: volume_title_label
                        text: "Volume"
                        align: CENTER
                        y: -86
                        width: 260
                        text_align: CENTER
                        text_color: 0xC4C7C5
                        text_font: roboto_20
                    - label:
                        id: volume_pct_label
                        text: "50%"
                        align: CENTER
                        y: 12
                        width: 300
                        height: 90
                        text_align: CENTER
                        text_color: 0xF2F2F2
                        text_font: roboto_36
                    - button:
                        id: volume_overlay_down_button
                        align: CENTER
                        x: -86
                        y: 256
                        width: 104
                        height: 104
                        radius: 52
                        bg_color: 0x332E3C
                        border_width: 1
                        border_color: 0x5C5F5E
                        widgets:
                          - label:
                              text: "-"
                              align: CENTER
                              text_color: 0xF2F2F2
                              text_font: roboto_36
                        on_click:
                          then:
                            - script.execute:
