# Main tile pages.
# Wear OS M3 Expressive layout: compact list chips, black canvas,
# tonal grouped controls and page indicators from the local design kit.
lvgl:
  pages:
    - id: controls_page
      bg_color: 0x000000
      scrollable: false
      scrollbar_mode: "off"
      widgets:
        - obj:
            id: controls_root_1
