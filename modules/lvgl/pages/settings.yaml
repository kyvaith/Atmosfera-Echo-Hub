                        text: "\uE5CA"
                        x: 28
                        y: 22
                        text_color: 0xC3EDCF
                        text_font: material_symbols_24
                    - label:
                        text: "True Colour"
                        x: 84
                        width: 360
                        y: 16
                        text_color: 0xF2F2F2
                        text_font: roboto_20
                    - label:
                        id: settings_true_colour_value
                        text: "ON"
                        align: RIGHT_MID
                        x: -26
                        text_color: 0xC3EDCF
                        text_font: roboto_24
                    - label:
                        id: settings_true_colour_note
                        text: "True Colour Active"
                        x: 84
                        width: 360
                        y: 52
                        text_color: 0xC4C7C5
                        text_font: roboto_16
