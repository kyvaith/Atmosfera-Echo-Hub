# On-device settings page.
# Settings mirror the Home Assistant config entities so debugging can happen directly on the hub.
lvgl:
  pages:
    - id: settings_page
      bg_color: 0x000000
      widgets:
        - obj:
            id: settings_root
            width: 800
            height: 800
            align: CENTER
            bg_color: 0x000000
            bg_opa: 100%
            border_width: 0
            radius: 0
            pad_all: 0
            scrollable: true
            scrollbar_mode: "off"
            widgets:
              - label:
                  text: "Settings"
                  align: TOP_MID
                  y: 46
                  width: 520
                  text_align: CENTER
                  text_color: 0xF2F2F2
                  text_font: roboto_24
              - label:
                  text: "Device"
                  align: TOP_MID
                  y: 82
                  width: 96
                  text_align: CENTER
                  bg_color: 0x303030
                  bg_opa: 100%
                  radius: 18
                  pad_top: 5
                  pad_bottom: 5
                  text_color: 0xC4C7C5
                  text_font: roboto_16
              - button:
                  id: settings_true_colour_button
                  x: 112
                  y: 126
                  width: 576
                  height: 78
                  radius: 39
                  bg_color: 0x332E3C
                  bg_opa: 100%
                  border_width: 0
                  shadow_width: 0
                  shadow_opa: 0%
                  outline_width: 0
                  outline_opa: 0%
                  border_color: 0x8CEED1
                  scrollable: false
                  gesture_bubble: true
