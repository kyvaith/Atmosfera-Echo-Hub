# Dynamic media player runtime.
# This handles the selected Home Assistant media_player, dynamic subscriptions and playback state UI.
esphome:
  includes:
    - static/ui_wavy_arc.h

globals:
  - id: subscription_gen
    type: int
    restore_value: no
    initial_value: '0'
  - id: subscribed_media_player_entity
    type: std::string
    restore_value: no
    initial_value: '""'
  - id: ha_base_url
    type: std::string
    restore_value: no
    initial_value: '""'
  - id: last_media_position
    type: float
    restore_value: no
    initial_value: '0.0f'
  - id: last_media_progress_percent
    type: int
    restore_value: no
    initial_value: '-1'
  - id: last_position_timestamp
    type: int
    restore_value: no
    initial_value: '0'
  - id: title_received_once
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: ha_position_epoch
    type: int
    restore_value: no
    initial_value: '0'
  - id: artist_has_content
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: is_track_info_hidden
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: volume_updating_from_ha
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: volume_pending_pct
    type: int
    restore_value: no
    initial_value: '-1'
  - id: volume_pending_until
    type: uint32_t
    restore_value: no
    initial_value: '0'
  - id: last_artwork_url
    type: std::string
    restore_value: no
    initial_value: '""'
  - id: media_action_pending
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: media_action_spinner_angle
    type: int
    restore_value: no
    initial_value: '270'
  - id: artwork_download_deferred
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: artwork_block_until
    type: uint32_t
    restore_value: no
    initial_value: '0'
  - id: last_artwork_refresh_ms
    type: uint32_t
    restore_value: no
    initial_value: '0'

script:
  - id: subscribe_media_after_boot
    mode: restart
    then:
      - wait_until:
          condition:
            lambda: |-
              return id(boot_sequence_done) &&
                     id(ui_tile_snapshots_ready) &&
                     !id(ui_snapshot_io_busy) &&
                     !lvgl_esphome_snapshot_is_active();
          timeout: 20s
      - delay: 300ms
      - script.execute: subscribe_media_player
      - script.execute: subscribe_media_queue_sensor
      - script.execute: subscribe_speaker_group_sensor

  - id: subscribe_media_player
    mode: restart
    then:
      - lambda: |-
          if (esphome::api::global_api_server == nullptr) return;

          std::string entity = id(media_player_entity).state;
          if (entity.empty() || entity == "media_player.music_assistant") {
            entity = "${tile_media_entity}";
            auto call = id(media_player_entity).make_call();
            call.set_value(entity);
            call.perform();
          }

          if (entity.rfind("media_player.", 0) != 0) {
            id(subscription_gen) += 1;
            id(subscribed_media_player_entity) = "";
            ESP_LOGW("media_select", "Invalid entity '%s' - must start with media_player.", entity.c_str());
            return;
          }

          if (entity == id(subscribed_media_player_entity)) {
            ESP_LOGD("media_select", "Already subscribed to '%s'", entity.c_str());
            return;
          }

          id(title_received_once) = false;
          id(last_media_position) = 0.0f;
          id(last_media_progress_percent) = -1;
          id(ha_position_epoch) = 0;
          id(last_position_timestamp) = 0;
          id(last_artwork_url) = "";
          id(artist_has_content) = false;
          id(subscription_gen) += 1;
          id(subscribed_media_player_entity) = entity;

          auto now = id(ha_time).now();
          if (now.is_valid()) {
            char time_buf[6];
            snprintf(time_buf, sizeof(time_buf), "%d:%02d", now.hour, now.minute);
            lv_label_set_text(id(top_status_label), time_buf);
          }
          lv_label_set_text(id(title_label), "No Track");
          lv_label_set_text(id(artist_label), "-");
          lv_label_set_text(id(album_label), "");
          lv_label_set_text(id(queue_current_title_label), "No Track");
          lv_label_set_text(id(queue_current_artist_label), "-");
          lv_label_set_text(id(media_time_label), "0:00 / 0:00");
          lv_obj_clear_flag(id(figma_media_artwork_widget), LV_OBJ_FLAG_HIDDEN);
          lv_obj_add_flag(id(album_art_background_widget), LV_OBJ_FLAG_HIDDEN);
          lv_obj_add_flag(id(artwork_primary_overlay), LV_OBJ_FLAG_HIDDEN);
          lv_obj_add_flag(id(artwork_scrim), LV_OBJ_FLAG_HIDDEN);
          id(last_media_progress_percent) = 0;
          id(media_update_main_control).execute();

          int gen = id(subscription_gen);
          int *gen_ptr = &id(subscription_gen);
          auto *api = esphome::api::global_api_server;
          using state_cb = std::function<void(esphome::StringRef)>;

          auto sub_text = [&](const std::string &attr, esphome::text_sensor::TextSensor *sensor) {
            api->subscribe_home_assistant_state(entity, esphome::optional<std::string>(attr),
                state_cb([gen, gen_ptr, sensor](esphome::StringRef state) {
                  if (gen != *gen_ptr) return;
                  sensor->publish_state(state.str());
                }));
          };

          auto sub_num = [&](const std::string &attr, esphome::sensor::Sensor *sensor) {
            api->subscribe_home_assistant_state(entity, esphome::optional<std::string>(attr),
                state_cb([gen, gen_ptr, sensor](esphome::StringRef state) {
                  if (gen != *gen_ptr) return;
                  auto v = esphome::parse_number<float>(state.str());
                  if (v.has_value()) sensor->publish_state(v.value());
                }));
          };

          sub_text("media_title", id(media_title_sensor));
          sub_text("media_artist", id(media_artist_sensor));
          sub_text("media_album_name", id(media_album_sensor));
          sub_text("entity_picture", id(media_entity_picture_sensor));
          api->subscribe_home_assistant_state(entity, esphome::optional<std::string>(""),
              state_cb([gen, gen_ptr](esphome::StringRef state) {
                if (gen != *gen_ptr) return;
                id(media_player_state_sensor).publish_state(state.str());
              }));
          sub_text("media_position_updated_at", id(media_position_updated_at_sensor));
          sub_num("media_duration", id(media_duration_sensor));
          sub_num("media_position", id(media_position_sensor));
          sub_num("volume_level", id(media_volume_sensor));
          sub_text("source", id(media_source_sensor));
          sub_text("group_members", id(group_members_sensor));

          ESP_LOGI("media_select", "Subscribed to '%s'", entity.c_str());

  - id: show_track_info
    mode: restart
    then:
      - lambda: |-
          id(is_track_info_hidden) = false;
      - lvgl.widget.show:
          - title_label
      - if:
          condition:
            lambda: 'return id(artist_has_content);'
          then:
            - lvgl.widget.show: artist_label

  - id: hide_track_info
    mode: restart
    then:
      - lambda: |-
          id(is_track_info_hidden) = true;
      - lvgl.widget.hide:
          - album_label
          - media_time_label

  - id: start_hide_track_info_timer
    mode: restart
    then:
      - if:
          condition:
            lambda: 'return id(auto_show_track_info).state && id(track_info_duration).state > 0;'
          then:
            - delay: !lambda 'return (uint32_t)(id(track_info_duration).state * 1000.0f);'
            - if:
                condition:
                  lambda: |-
                    return id(media_player_state_sensor).has_state()
                        && id(media_player_state_sensor).state == "playing";
                then:
                  - script.execute: hide_track_info

  - id: debounce_artwork_download
    mode: restart
    then:
      - delay: 100ms
      - lambda: |-
          const int phase = id(voice_assistant_phase);
          const bool voice_busy = phase != ${voice_assist_idle_phase_id} &&
                                  phase != ${voice_assist_not_ready_phase_id};
          const bool artwork_blocked = id(media_action_pending) ||
                                       id(ui_snapshot_io_busy) ||
                                       !id(boot_sequence_done) ||
                                       (int32_t)(id(artwork_block_until) - millis()) > 0;
          const bool artwork_needed = id(ui_active_app) == 1;
          if (voice_busy || artwork_blocked || !artwork_needed) {
            id(artwork_download_deferred) = true;
          }
      - if:
          condition:
            lambda: |-
              const int phase = id(voice_assistant_phase);
              const bool artwork_blocked = id(media_action_pending) ||
                                           id(ui_snapshot_io_busy) ||
                                           !id(boot_sequence_done) ||
                                           (int32_t)(id(artwork_block_until) - millis()) > 0;
              return !id(last_artwork_url).empty() &&
                     (phase == ${voice_assist_idle_phase_id} || phase == ${voice_assist_not_ready_phase_id}) &&
                     id(ui_active_app) == 1 &&
                     !artwork_blocked;
          then:
            - lambda: id(artwork_download_deferred) = false;
            - artwork_image.set_url:
                id: album_art_background
                update: true
                url: !lambda 'return id(last_artwork_url);'

  - id: media_resume_deferred_artwork
    mode: restart
    then:
      - if:
          condition:
            lambda: |-
              const int phase = id(voice_assistant_phase);
              const bool artwork_blocked = id(media_action_pending) ||
                                           id(ui_snapshot_io_busy) ||
                                           !id(boot_sequence_done) ||
                                           (int32_t)(id(artwork_block_until) - millis()) > 0;
              return id(artwork_download_deferred) &&
                     (phase == ${voice_assist_idle_phase_id} || phase == ${voice_assist_not_ready_phase_id}) &&
                     id(ui_active_app) == 1 &&
                     !artwork_blocked;
          then:
            - if:
                condition:
                  lambda: 'return !id(last_artwork_url).empty();'
                then:
                  - lambda: id(artwork_download_deferred) = false;
                  - script.execute: debounce_artwork_download
                else:
                  - script.execute: media_apply_artwork

  - id: refresh_progress_bar_from_state
    mode: restart
    then:
      - lambda: |-
          const int phase = id(voice_assistant_phase);
          if (phase != ${voice_assist_idle_phase_id} && phase != ${voice_assist_not_ready_phase_id}) {
            return;
          }

          float dur = id(media_duration_sensor).has_state() ? id(media_duration_sensor).state : 0.0f;
          float pos = id(last_media_position);
          bool playing = id(media_player_state_sensor).has_state()
              && id(media_player_state_sensor).state == "playing";

          auto t = id(ha_time).now();
          if (playing && t.is_valid() && id(ha_position_epoch) != 0 && id(media_position_sensor).has_state()) {
            pos = id(media_position_sensor).state + (float)(t.timestamp - id(ha_position_epoch));
          }

          if (pos < 0.0f) pos = 0.0f;
          if (dur > 0.0f && pos > dur) pos = dur;
          id(last_media_position) = pos;
          if (t.is_valid()) id(last_position_timestamp) = t.timestamp;

          const int progress_range = 100;
          int value = 0;
          if (dur > 0.0f) {
            value = (int)((pos / dur) * (float)progress_range + 0.5f);
          }
          if (value < 0) value = 0;
          if (value > progress_range) value = progress_range;
          if (value != id(last_media_progress_percent)) {
            id(last_media_progress_percent) = value;
            atmosfera_ui::media_wavy_arc_init(id(media_main_progress_arc));
            atmosfera_ui::media_wavy_arc_set_value(value);
            id(media_update_main_control).execute();
          }

          int e = (int)pos;
          if (e < 0) e = 0;
          char buf[40];
          if (id(show_remaining_time).state) {
            int rem = (int)(dur - pos);
            if (rem < 0) rem = 0;
            if (dur >= 3600.0f) {
              snprintf(buf, sizeof(buf), "%d:%02d:%02d / -%d:%02d:%02d",
                       e / 3600, (e % 3600) / 60, e % 60,
                       rem / 3600, (rem % 3600) / 60, rem % 60);
            } else {
              snprintf(buf, sizeof(buf), "%d:%02d / -%d:%02d", e / 60, e % 60, rem / 60, rem % 60);
            }
          } else {
            int d = (int)dur;
            if (d < 0) d = 0;
            if (dur >= 3600.0f) {
              snprintf(buf, sizeof(buf), "%d:%02d:%02d / %d:%02d:%02d",
                       e / 3600, (e % 3600) / 60, e % 60,
                       d / 3600, (d % 3600) / 60, d % 60);
            } else {
              snprintf(buf, sizeof(buf), "%d:%02d / %d:%02d", e / 60, e % 60, d / 60, d % 60);
            }
          }
          lv_label_set_text(id(media_time_label), buf);

  - id: media_update_main_control
    mode: restart
    then:
      - lambda: |-
          int progress = id(last_media_progress_percent);
          if (progress < 0) progress = 0;
          if (progress > 100) progress = 100;
          atmosfera_ui::media_wavy_arc_init(id(media_main_progress_arc));
          atmosfera_ui::media_wavy_arc_set_value(progress);

          const bool playing = id(media_player_state_sensor).has_state()
              && id(media_player_state_sensor).state == "playing";
          if (playing) {
            lv_label_set_text(id(media_main_icon_label), "\U0000e034");
          } else {
            lv_label_set_text(id(media_main_icon_label), "\U0000e037");
          }
          lv_obj_clear_flag(id(media_main_icon_label), LV_OBJ_FLAG_HIDDEN);
          if (id(ui_active_app) != 1 || id(ui_snapshot_io_busy)) {
            lv_obj_add_flag(id(media_action_spinner_arc), LV_OBJ_FLAG_HIDDEN);
          }

  - id: media_show_action_spinner
    mode: restart
    then:
      - lambda: |-
          id(media_action_pending) = true;
          id(media_action_spinner_angle) = 270;
          if (id(media_action_spinner_arc) != nullptr) {
            lv_arc_set_rotation(id(media_action_spinner_arc), id(media_action_spinner_angle));
            lv_obj_clear_flag(id(media_action_spinner_arc), LV_OBJ_FLAG_HIDDEN);
          }
      - script.execute: media_action_spinner_timeout

  - id: media_hide_action_spinner
    mode: restart
    then:
      - lambda: |-
          id(media_action_pending) = false;
          if (id(media_action_spinner_arc) != nullptr) {
            lv_obj_add_flag(id(media_action_spinner_arc), LV_OBJ_FLAG_HIDDEN);
          }

  - id: media_action_spinner_timeout
    mode: restart
    then:
      - delay: 4s
      - script.execute: media_hide_action_spinner

  - id: show_volume_overlay
    mode: restart
    then:
      - lvgl.widget.show: volume_overlay
      - lambda: |-
          lv_obj_move_foreground(id(volume_overlay));
      - script.execute: volume_overlay_timeout

  - id: open_queue_panel
    mode: restart
    then:
      - lvgl.widget.show: queue_panel
      - lambda: |-
          lv_obj_move_foreground(id(queue_panel));
      - script.execute: subscribe_media_queue_sensor
      - delay: 150ms
      - script.execute: update_media_queue_panel

  - id: close_queue_panel
    mode: restart
    then:
      - lvgl.widget.hide: queue_panel

  - id: volume_overlay_timeout
    mode: restart
    then:
      - delay: 2500ms
      - lvgl.widget.hide: volume_overlay

  - id: main_volume_step
    mode: restart
    parameters:
      direction: int
    then:
      - lambda: |-
          int pct = lv_arc_get_value(id(volume_arc)) + (direction > 0 ? 1 : -1);
          if (pct < 0) pct = 0;
          if (pct > 100) pct = 100;
          id(volume_updating_from_ha) = false;
          lv_arc_set_value(id(volume_arc), pct);
      - script.execute: show_volume_overlay

  - id: media_show_lottie_visual
    mode: restart
    then:
      - lvgl.widget.show: lottie_visual_zone
      - lambda: |-
          if (id(weather_animation) != nullptr) {
            auto *ctx = static_cast<esphome::lvgl::LottieContext *>(lv_obj_get_user_data(id(weather_animation)));
            esphome::lvgl::lottie_show(ctx, true);
          }

  - id: media_hide_lottie_visual
    mode: restart
    then:
      - lambda: |-
          if (id(weather_animation) != nullptr) {
            auto *ctx = static_cast<esphome::lvgl::LottieContext *>(lv_obj_get_user_data(id(weather_animation)));
            esphome::lvgl::lottie_hide(ctx);
          }
      - lvgl.widget.hide: lottie_visual_zone

  - id: media_apply_artwork
    mode: restart
    then:
      - if:
          condition:
            lambda: |-
              const int phase = id(voice_assistant_phase);
              const bool voice_busy = phase != ${voice_assist_idle_phase_id} &&
                                      phase != ${voice_assist_not_ready_phase_id};
              return voice_busy || id(ui_snapshot_io_busy) || !id(boot_sequence_done) || id(ui_active_app) != 1;
          then:
            - lambda: id(artwork_download_deferred) = true;
          else:
            - lambda: |-
                if (id(album_art_background).get_width() <= 0 || id(album_art_background).get_height() <= 0) {
                  id(artwork_download_deferred) = true;
                  return;
                }
                id(artwork_download_deferred) = false;
                auto *img = id(album_art_background_widget);
                auto *src = id(album_art_background).get_lv_image_dsc();
                lv_image_set_src(img, src);
                if (!lv_obj_has_flag(id(figma_media_artwork_widget), LV_OBJ_FLAG_HIDDEN)) {
                  lv_obj_add_flag(id(figma_media_artwork_widget), LV_OBJ_FLAG_HIDDEN);
                }
                if (lv_obj_has_flag(img, LV_OBJ_FLAG_HIDDEN)) {
                  lv_obj_clear_flag(img, LV_OBJ_FLAG_HIDDEN);
                }
                if (lv_obj_has_flag(id(artwork_primary_overlay), LV_OBJ_FLAG_HIDDEN)) {
                  lv_obj_clear_flag(id(artwork_primary_overlay), LV_OBJ_FLAG_HIDDEN);
                }
                if (lv_obj_has_flag(id(artwork_scrim), LV_OBJ_FLAG_HIDDEN)) {
                  lv_obj_clear_flag(id(artwork_scrim), LV_OBJ_FLAG_HIDDEN);
                }
                if (!lv_obj_has_flag(id(artwork_error_label), LV_OBJ_FLAG_HIDDEN)) {
                  lv_obj_add_flag(id(artwork_error_label), LV_OBJ_FLAG_HIDDEN);
                }
            - script.execute: media_hide_lottie_visual
            - script.execute: start_hide_track_info_timer

  - id: media_handle_artwork_error
    mode: restart
    then:
      - if:
          condition:
            lambda: 'return lv_obj_has_flag(id(album_art_background_widget), LV_OBJ_FLAG_HIDDEN);'
          then:
            - lvgl.widget.show: figma_media_artwork_widget
            - lvgl.widget.hide:
                - artwork_primary_overlay
                - artwork_scrim
            - lvgl.widget.show: artwork_error_label
      - if:
          condition:
            lambda: 'return id(ui_page) == 0;'
          then:
            - script.execute: media_show_lottie_visual

text_sensor:
  - platform: sendspin
    id: sendspin_media_title
    sendspin_id: sendspin_hub
    type: title
    internal: true
    on_value:
      - text_sensor.template.publish:
          id: media_title_sensor
          state: !lambda 'return x;'

  - platform: sendspin
    id: sendspin_media_artist
    sendspin_id: sendspin_hub
    type: artist
    internal: true
    on_value:
      - text_sensor.template.publish:
          id: media_artist_sensor
          state: !lambda 'return x;'

  - platform: sendspin
    id: sendspin_media_album
    sendspin_id: sendspin_hub
    type: album
    internal: true
    on_value:
      - text_sensor.template.publish:
          id: media_album_sensor
          state: !lambda 'return x;'

  - platform: sendspin
    id: sendspin_media_artwork_url
    sendspin_id: sendspin_hub
    type: artwork_url
    internal: true
    on_value:
      - text_sensor.template.publish:
          id: media_entity_picture_sensor
          state: !lambda 'return x;'

  - platform: template
    id: media_title_sensor
    internal: true
    on_value:
      - if:
          condition:
            lambda: 'return !x.empty();'
          then:
            - script.execute: media_hide_action_spinner
            - if:
                condition:
                  lambda: 'return id(auto_show_track_info).state;'
                then:
                  - script.execute: show_track_info
            - lvgl.label.update:
                id: title_label
                text: !lambda 'return x;'
            - lvgl.label.update:
                id: queue_current_title_label
                text: !lambda 'return x;'
            - lambda: |-
                if (id(title_received_once)) {
                  id(last_media_position) = 0.0f;
                  id(last_media_progress_percent) = -1;
                  id(ha_position_epoch) = 0;
                  auto t = id(ha_time).now();
                  if (t.is_valid()) id(last_position_timestamp) = t.timestamp;
                  id(refresh_progress_bar_from_state).execute();
                } else {
                  id(title_received_once) = true;
                }
            - if:
                condition:
                  lambda: 'return !id(last_artwork_url).empty() && id(ui_active_app) == 1;'
                then:
                  - script.execute: debounce_artwork_download
            - script.execute: start_hide_track_info_timer
          else:
            - lvgl.label.update:
                id: title_label
                text: "No Track"
            - lvgl.label.update:
                id: queue_current_title_label
                text: "No Track"

  - platform: template
    id: media_artist_sensor
    internal: true
    on_value:
      - lambda: |-
          id(artist_has_content) = !x.empty() && x != "-";
      - if:
          condition:
            lambda: 'return id(artist_has_content);'
          then:
            - lvgl.label.update:
                id: artist_label
                text: !lambda 'return x;'
            - lvgl.label.update:
                id: queue_current_artist_label
                text: !lambda 'return x;'
            - if:
                condition:
                  lambda: 'return !id(is_track_info_hidden);'
                then:
                  - lvgl.widget.show: artist_label
          else:
            - lvgl.label.update:
                id: artist_label
                text: "-"
            - lvgl.label.update:
                id: queue_current_artist_label
                text: "-"
            - lvgl.widget.hide: artist_label

  - platform: template
    id: media_album_sensor
    internal: true
    on_value:
      - lvgl.label.update:
          id: album_label
          text: !lambda 'return x;'

  - platform: template
    id: media_entity_picture_sensor
    internal: true
    on_value:
      - lambda: |-
          // SendSpin ArtworkRole supplies negotiated binary artwork. Keep the
          // metadata URL only as diagnostic state and do not fetch arbitrary
          // remote artwork URLs from the UI task.
          id(last_artwork_url) = "";
          id(last_artwork_refresh_ms) = millis();

  - platform: template
    id: media_player_state_sensor
    internal: true
    on_value:
      - script.execute: media_hide_action_spinner
      - if:
          condition:
            lambda: 'return x == "playing";'
          then:
            - lambda: |-
                id(artwork_block_until) = 0;
            - script.execute: media_update_main_control
            - if:
                condition:
                  lambda: 'return id(boot_sequence_done) && id(ui_active_app) == 0;'
                then:
                  - script.execute: ui_open_player_app
            - if:
                condition:
                  lambda: 'return id(auto_show_track_info).state;'
                then:
                  - script.execute: show_track_info
            - script.execute: start_hide_track_info_timer
      - if:
          condition:
            lambda: 'return x == "paused" || x == "idle" || x == "off" || x == "standby";'
          then:
            - lambda: 'id(artwork_block_until) = 0;'
            - script.execute: media_update_main_control
            - script.stop: start_hide_track_info_timer
            - script.execute: media_resume_deferred_artwork
      - if:
          condition:
            lambda: 'return x == "idle" || x == "off" || x == "standby";'
          then:
            - lambda: |-
                id(last_media_position) = 0.0f;
                id(ha_position_epoch) = 0;
                id(last_position_timestamp) = 0;
                id(last_media_progress_percent) = -1;
            - lambda: |-
                atmosfera_ui::media_wavy_arc_init(id(media_main_progress_arc));
                atmosfera_ui::media_wavy_arc_set_value(0);
      - script.execute: refresh_progress_bar_from_state

  - platform: template
    id: media_position_updated_at_sensor
    internal: true
    on_value:
      - lambda: |-
          int yr, mo, dy, hr, mn, sc;
          if (sscanf(x.c_str(), "%d-%d-%dT%d:%d:%d", &yr, &mo, &dy, &hr, &mn, &sc) != 6 &&
              sscanf(x.c_str(), "%d-%d-%d %d:%d:%d", &yr, &mo, &dy, &hr, &mn, &sc) != 6) {
            return;
          }
          int y = yr;
          int m = mo;
          if (m <= 2) {
            y--;
            m += 12;
          }
          long days = 365L * y + y / 4 - y / 100 + y / 400 + (153 * (m - 3) + 2) / 5 + dy - 719469;
          int epoch = (int)(days * 86400L + hr * 3600 + mn * 60 + sc);
          id(ha_position_epoch) = epoch;
          if (id(media_position_sensor).has_state()) {
            id(last_position_timestamp) = epoch;
            float anchor = id(media_position_sensor).state;
            auto t = id(ha_time).now();
            if (t.is_valid()) anchor += (float)(t.timestamp - epoch);
            if (anchor < 0.0f) anchor = 0.0f;
            id(last_media_position) = anchor;
          }
          id(refresh_progress_bar_from_state).execute();

  - platform: template
    id: media_source_sensor
    internal: true

sensor:
  - platform: sendspin
    id: sendspin_track_duration_ms
    sendspin_id: sendspin_hub
    type: track_duration
    internal: true
    on_value:
      - sensor.template.publish:
          id: media_duration_sensor
          state: !lambda 'return x / 1000.0f;'

  - platform: sendspin
    id: sendspin_track_progress_ms
    sendspin_id: sendspin_hub
    type: track_progress
    internal: true
    update_interval: 1s
    on_value:
      - lambda: |-
          id(ha_position_epoch) = 0;
      - sensor.template.publish:
          id: media_position_sensor
          state: !lambda 'return x / 1000.0f;'

  - platform: template
    id: media_duration_sensor
    internal: true
    on_value:
      - script.execute: media_hide_action_spinner
      - script.execute: refresh_progress_bar_from_state

  - platform: template
    id: media_position_sensor
    internal: true
    on_value:
      - script.execute: media_hide_action_spinner
      - lambda: |-
          id(last_media_position) = x;
          auto t = id(ha_time).now();
          if (id(ha_position_epoch) != 0) {
            id(last_position_timestamp) = id(ha_position_epoch);
            if (t.is_valid()) id(last_media_position) = x + (float)(t.timestamp - id(ha_position_epoch));
          } else if (t.is_valid()) {
            id(last_position_timestamp) = t.timestamp;
          }
          if (id(last_media_position) < 0.0f) id(last_media_position) = 0.0f;
          id(refresh_progress_bar_from_state).execute();

  - platform: template
    id: media_volume_sensor
    internal: true
    on_value:
      - lambda: |-
          float volume = x;
          if (volume < 0.0f) volume = 0.0f;
          if (volume > 1.0f) volume = 1.0f;
          int pct = (int)(volume * 100.0f + 0.5f);
          if (id(volume_pending_until) != 0) {
            uint32_t now = millis();
            bool pending_active = (int32_t)(id(volume_pending_until) - now) > 0;
            if (pending_active && pct != id(volume_pending_pct)) {
              ESP_LOGD("volume", "Ignoring stale volume echo: %d%% while waiting for %d%%", pct, id(volume_pending_pct));
              return;
            }
            id(volume_pending_pct) = -1;
            id(volume_pending_until) = 0;
          }
          id(volume_updating_from_ha) = true;
          lv_arc_set_value(id(volume_arc), pct);
          id(volume_updating_from_ha) = false;
          char buf[8];
          snprintf(buf, sizeof(buf), "%d%%", pct);
          lv_label_set_text(id(volume_pct_label), buf);
          if (id(speaker_count) <= 1) {
            id(speaker_volumes)[0] = volume;
            id(update_speaker_group_panel).execute();
          }

interval:
  - interval: 120ms
    then:
      - if:
          condition:
            lambda: 'return id(media_action_pending);'
          then:
            - lambda: |-
                id(media_action_spinner_angle) += 22;
                if (id(media_action_spinner_angle) >= 360) id(media_action_spinner_angle) -= 360;
                lv_arc_set_rotation(id(media_action_spinner_arc), id(media_action_spinner_angle));

  - interval: 1s
    then:
      - if:
          condition:
            lambda: |-
              const int phase = id(voice_assistant_phase);
              return id(ui_active_app) == 1 &&
                     (phase == ${voice_assist_idle_phase_id} || phase == ${voice_assist_not_ready_phase_id});
          then:
            - lambda: |-
                auto now = id(ha_time).now();
                if (now.is_valid()) {
                  char time_buf[6];
                  snprintf(time_buf, sizeof(time_buf), "%d:%02d", now.hour, now.minute);
                  lv_label_set_text(id(top_status_label), time_buf);
                }
      - if:
          condition:
            lambda: |-
              const int phase = id(voice_assistant_phase);
              return id(media_player_state_sensor).has_state()
                  && id(media_player_state_sensor).state == "playing"
                  && (phase == ${voice_assist_idle_phase_id} || phase == ${voice_assist_not_ready_phase_id});
          then:
            - script.execute: refresh_progress_bar_from_state
