# ESP32-P4 board, hosted radio and memory tuning.
# Keep CPU, PSRAM, flash and SDIO choices together because they affect display and audio throughput.
esp32:
  board: esp32-p4-evboard
  flash_size: 32MB
  cpu_frequency: 360MHz
  engineering_sample: true
  framework:
    type: esp-idf
    version: recommended
    advanced:
      enable_idf_experimental_features: true
      enable_lwip_assert: false
      compiler_optimization: PERF
    sdkconfig_options:
      CONFIG_ESP_TASK_WDT_TIMEOUT_S: "30"
      CONFIG_LWIP_MAX_SOCKETS: "20"
      CONFIG_ESP_MAIN_TASK_STACK_SIZE: "4096"
      CONFIG_ESP_TIMER_TASK_STACK_SIZE: "2048"
      CONFIG_FREERTOS_TIMER_TASK_STACK_DEPTH: "2048"
      CONFIG_SPIRAM_SPEED_200M: "y"
      CONFIG_SPIRAM_SPEED: "200"
      CONFIG_SPIRAM_USE_MALLOC: "y"
      # Keep tiny control allocations internal, but let larger stacks/buffers
      # use PSRAM. IDF 6 allocates the FreeRTOS timer stack with pvPortMalloc()
      # before ESPHome starts; forcing 2 KiB allocations internal can bootloop.
      CONFIG_SPIRAM_MALLOC_ALWAYSINTERNAL: "1024"
      CONFIG_SPIRAM_MALLOC_RESERVE_INTERNAL: "65536"
      CONFIG_FREERTOS_TASK_CREATE_ALLOW_EXT_MEM: "y"
      CONFIG_ESP_HOSTED_MEMPOOL_PREFER_SPIRAM: "y"
      CONFIG_LV_DEF_REFR_PERIOD: "10"
      CONFIG_LV_USE_LOG: "0"
      # ESP32-P4 exposes Espressif's xespv extension, not standard RISC-V V.
      # LVGL's RISCV_V path falls back to software emulation here, so keep it off.
      CONFIG_LV_USE_DRAW_SW_ASM: "0"
      CONFIG_LV_DRAW_SW_SUPPORT_RGB888: "y"
      CONFIG_LV_DRAW_SW_SUPPORT_ARGB8888: "y"
      CONFIG_LV_DRAW_SW_SUPPORT_ARGB8888_PREMULTIPLIED: "y"
      # Keep DSI interrupt work and objects in internal memory. These are
      # normally selected by IDF already, but listing them keeps the display
      # latency assumptions explicit in this project.
      CONFIG_LCD_DSI_ISR_HANDLER_IN_IRAM: "y"
      CONFIG_LCD_DSI_ISR_CACHE_SAFE: "y"
      CONFIG_LCD_DSI_OBJ_FORCE_INTERNAL: "y"
      CONFIG_ESP_IPC_ENABLE: "y"
      # Isolated JPEG/DMA2D tuning. Keep LVGL/PPA burst length on its default;
      # this one only affects the hardware JPEG decoder path used by artwork.
      CONFIG_ESPHOME_JPEG_DMA2D_BURST_LENGTH: "1"
      # Keep ESP32-P4 revision selection explicit so IDF does not silently
      # downgrade PPA/DMA2D code paths for older silicon assumptions.
      CONFIG_ESP_REV_MIN_FULL: "0"
      CONFIG_ESP32P4_REV_MIN_FULL: "0"
      CONFIG_ESPTOOLPY_FLASHMODE_QIO: "y"
      CONFIG_PARTITION_TABLE_OFFSET: "0x9000"

esp32_hosted:
  type: sdio
  active_high: true
  variant: ESP32C6
  reset_pin: GPIO54
  cmd_pin: GPIO19
  clk_pin: GPIO18
  d0_pin: GPIO14
  d1_pin: GPIO15
  d2_pin: GPIO16
  d3_pin: GPIO17
  bus_width: 4
  sdio_frequency: 20MHz

psram:
  mode: hex
  speed: 200MHz

esp32_jpeg:

esp_ldo:
  - channel: 3
    voltage: 2.5V
